        :root {

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            margin: 0 auto;
            padding: 20px;

            color: #333;
        }
        h1, h2, h3 {

        }
        #statusContainer {

        #controls {

            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);

            background-color: #f9f9f9;

            border: 1px solid #ddd;
            border-radius: 3px;
            margin-right: 10px;
        }

            border-radius: 3px;

        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;

            background-color: #e74c3c;
            animation: pulse 1.5s infinite;
        }
        .status-offline {
            background-color: #95a5a6;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }

            padding-bottom: 8px;

        .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);

    align-items: center;

    padding: 20px;

.modal-content {

.form-row {

.form-group {

.form-group label {

.form-group input,

.form-group input:focus,

    padding-top: 20px;

    async function handleViewerJoined(message) {

    // WebRTC Handlers
   async function handleOffer(message) {
    if (isHost) {
        try {
            let pc = peerConnections.get(message.userId);
            if (!pc) {
                pc = new RTCPeerConnection(config);

                // Add local stream tracks to this connection
                stream.getTracks().forEach(track => {
                    pc.addTrack(track, stream);
                });

                // Set up data channel for this viewer
                pc.ondatachannel = (event) => {
                    // Optionally, store per-viewer data channels if needed
                    setupDataChannel(event.channel);
                };

                // ICE candidate handler for this viewer
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        socket.send(JSON.stringify({
                            type: 'ice_candidate',
                            candidate: event.candidate,
                            userId,
                            targetId: message.userId // send to this viewer only
                        }));
                    }
                };

                peerConnections.set(message.userId, pc);
            }

            await pc.setRemoteDescription(new RTCSessionDescription(message.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            socket.send(JSON.stringify({
                type: 'answer',
                answer: answer,
                userId,
                targetId: message.userId
            }));
        } catch (error) {
            console.error('Error handling offer:', error);
        }
    }
}
            
        function handleStreamEnded() {

            } else {
                cleanup();
            }

        // Recording functions
        function startRecording() {
            recordedChunks = [];
            const options = { mimeType: 'video/webm;codecs=vp9' };
            mediaRecorder = new MediaRecorder(stream, options);
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };
            
            mediaRecorder.start(1000); // Collect data every second
        }
        
        async function endAndSaveLiveStream(durationSeconds, durationMinutes) {
            return new Promise(async (resolve) => {
                // Stop media recorder
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.onstop = async () => {
                        const completeBlob = new Blob(recordedChunks, { type: 'video/webm' });
                        await saveStreamToServer(completeBlob, durationMinutes, durationSeconds);
                        cleanup();
                        resolve();
                    };
                    mediaRecorder.stop();
                } else {
                    cleanup();
                    resolve();
                }
            });
        }
        
        function cleanup() {
            // Stop all media tracks
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            if (isHost && peerConnections) {
        peerConnections.forEach(pc => pc.close());
        peerConnections.clear();
    }
            // Reset UI
            hostVideo.srcObject = null;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            chatInput.disabled = true;
            sendChatBtn.disabled = true;
            joinBtn.disabled = false;
            chatMessages.innerHTML = '';
            updateStreamStatus(false);
            
            // Clear variables
            peerConnection = null;
            localStream = null;
            dataChannel = null;
            mediaRecorder = null;
            recordedChunks = [];
            isHost = false;
        }
        
        async function saveStreamToServer(blob, durationSeconds, durationMinutes){
            try {
                const user = JSON.parse(localStorage.getItem('user'));
                const userId = user.id;
                const classTitle = document.getElementById('title').value;
                const classDescription = document.getElementById('description').value;
                const streamClass = document.getElementById('streamClass').value;
                const respo = await fetch(`http://localhost:3000/register/class/${streamClass}`);
                const resultB = await respo.json();
                const streamClassOption = resultB.classA[0].title;
                const participants = totalUniqueViewers.size;
                const duration =`${durationSeconds} Minutes, ${durationMinutes} Seconds`;
                const streamName = `${streamClassOption}_${classTitle}_${new Date().toISOString().replace(/[:.]/g, '-')}`;
                const formData = new FormData();
                formData.append('video', blob, `${streamName}.webm`);
                formData.append('userId', userId);
                formData.append('streamName', streamName);
                formData.append('streamClass', streamClass);
                formData.append('classTitle', classTitle);
                formData.append('classDescription', classDescription);
                formData.append('participants', participants);
                formData.append('duration', duration);
                
                const response = await fetch('http://localhost:3000/api/save-stream', {
                    method: 'POST',
                    body: formData,
                });
                
                if (!response.ok) {
                    throw new Error('Failed to save stream');
                }
                
                const result = await response.json();
                console.log('Stream saved:', result);
                return result;
            } catch (error) {
                console.error('Error saving stream:', error);
                throw error;
            }
        }
        
   function setupDataChannel(channel) {
    dataChannel = channel;

    channel.onopen = () => {
        console.log('Data channel opened');
        chatInput.disabled = false;
        sendChatBtn.disabled = false;
    };

    channel.onclose = () => {
        console.log('Data channel closed');
        chatInput.disabled = true;
        sendChatBtn.disabled = true;
    };

    channel.onmessage = (event) => {
        try {
            const message = JSON.parse(event.data);
            if (message.type === 'chat_message') {
                displayChatMessage(message);
            }
        } catch (error) {
            console.error('Error parsing message:', error);
        }
    };
}

async function handleIceCandidate(message) {
    try {
        if (isHost && message.targetId) {
            // Host: add candidate to the correct viewer's connection
            const pc = peerConnections.get(message.targetId);
            if (pc && message.candidate) {
                await pc.addIceCandidate(new RTCIceCandidate(message.candidate));
                console.log('Host added ICE candidate for viewer', message.targetId);
            }
        } else if (!isHost && peerConnection && message.candidate) {
            // Viewer: add candidate to own connection
            await peerConnection.addIceCandidate(new RTCIceCandidate(message.candidate));
            console.log('Viewer added ICE candidate');
        }
    } catch (error) {
        console.error('Error adding ICE candidate:', error);
    }
}
    async function handleAnswer(message) {
        if (!isHost) {
            try {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(message.answer));
                console.log('Answer received and set as remote description');
            } catch (error) {
                console.error('Error handling answer:', error);
            }
        }
    }
    function updateViewersList(viewers) {
    viewersList.innerHTML = '';
    viewers.forEach(viewer => {
        const li = document.createElement('li');
        li.className = 'viewer-item';
        li.textContent = viewer.name;
        viewersList.appendChild(li);

         totalUniqueViewers.add(viewer.id);
    });
    viewerCount.textContent = viewers.length;
}

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendChatBtn.click();
            }
        });
function sendChatMessage() {
    const message = chatInput.value.trim();
    if (!message) return;

    const chatMsg = {
        type: 'chat_message',
        userId,
        userName,
        message,
        timestamp: new Date().toISOString()
    };

    // Try sending through data channel first
    if (dataChannel && dataChannel.readyState === 'open') {
        try {
            dataChannel.send(JSON.stringify(chatMsg));
            displayChatMessage(chatMsg); // Show message immediately
            chatInput.value = '';
            return;
        } catch (error) {
            console.error('Data channel send failed:', error);
        }
    }

    // Fallback to WebSocket
    if (socket && socket.readyState === WebSocket.OPEN) {
        try {
            socket.send(JSON.stringify(chatMsg));
            if (isHost) { // Host needs to see their own messages
                displayChatMessage(chatMsg);
            }
            chatInput.value = '';
        } catch (error) {
            console.error('WebSocket send failed:', error);
        }
    } else {
        console.error('No available connection for chat');
        alert('Connection lost. Please refresh the page.');
    }
}


function displayChatMessage(msg) {
    const messageElement = document.createElement('div');
    messageElement.className = 'message';
    
    // Format the timestamp if it exists
    const timestamp = msg.timestamp ? formatTime(msg.timestamp) : 'just now';
    
    messageElement.innerHTML = `
        <strong>${msg.userName || 'Unknown'}:</strong> ${msg.message}
        <span class="message-time">${timestamp}</span>
    `;
    
    chatMessages.appendChild(messageElement);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

// Helper function to format timestamp
function formatTime(timestamp) {
    try {
        const date = new Date(timestamp);
        return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    } catch (e) {
        console.error('Error formatting timestamp:', e);
        return '';
    }
}
